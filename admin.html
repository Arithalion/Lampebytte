<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Lampebytte</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <div id="login-screen">
    <div class="login-box">
      <h2>Admin – Lampebytte</h2>
      <p>Logg inn for å administrere lamper</p>
      <form id="login-form">
        <div class="form-group">
          <label for="input-email">E-post</label>
          <input id="input-email" type="email" autocomplete="email" autofocus>
        </div>
        <div class="form-group">
          <label for="input-password">Passord</label>
          <input id="input-password" type="password" autocomplete="current-password">
        </div>
        <p id="login-error">Feil e-post eller passord. Prøv igjen.</p>
        <div class="modal-actions">
          <button type="submit" class="btn-primary">Logg inn</button>
          <a href="index.html" class="btn-secondary" style="text-align:center;text-decoration:none;display:block;padding:12px">← Tilbake til siden</a>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script>
    // Already logged in → go straight to requests
    db.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'admin-requests.html';
    });

    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const email = document.getElementById('input-email').value.trim();
      const password = document.getElementById('input-password').value;
      const { error } = await db.auth.signInWithPassword({ email, password });
      if (error) {
        document.getElementById('login-error').style.display = 'block';
        document.getElementById('input-password').value = '';
      } else {
        window.location.href = 'admin-requests.html';
      }
    });
  </script>
</body>
</html>
